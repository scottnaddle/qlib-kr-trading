# ═══════════════════════════════════════════════════════════════
# qlib 백테스팅 설정 - 미국 주식 (NASDAQ 100)
# 실행: qrun config/workflow_us.yaml
# ═══════════════════════════════════════════════════════════════

qlib_init:
  provider_uri: "~/.qlib/qlib_data/us_data"
  region: us

market: &market nasdaq100

data_handler_config: &data_handler_config
  start_time: "2020-01-01"
  end_time: "2024-12-31"
  fit_start_time: "2020-01-01"
  fit_end_time: "2022-12-31"
  instruments: *market

  infer_processors:
    - class: RobustZScoreNorm
      module_path: qlib.data.dataset.processor
      kwargs:
        fields_group: feature
        clip_outlier: true
    - class: Fillna
      module_path: qlib.data.dataset.processor
      kwargs:
        fields_group: feature

  learn_processors:
    - class: DropnaLabel
      module_path: qlib.data.dataset.processor
    - class: CSRankNorm
      module_path: qlib.data.dataset.processor
      kwargs:
        fields_group: label

  label:
    - "Ref($close, -5) / $close - 1"

dataset:
  class: DatasetH
  module_path: qlib.data.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: qlib.contrib.data.handler
      kwargs: *data_handler_config
    segments:
      train: ["2020-01-01", "2022-12-31"]
      valid: ["2023-01-01", "2023-06-30"]
      test:  ["2023-07-01", "2024-12-31"]

model:
  class: LGBModel
  module_path: qlib.contrib.model.gbdt
  kwargs:
    loss: mse
    colsample_bytree: 0.8879
    learning_rate: 0.2
    subsample: 0.8
    lambda_l1: 205.6999
    lambda_l2: 580.9768
    max_depth: 8
    num_leaves: 210
    num_threads: 4
    verbose: -1

strategy:
  class: TopkDropoutStrategy
  module_path: qlib.contrib.strategy
  kwargs:
    signal:
      - <MODEL>
      - <DATASET>
    topk: 20
    n_drop: 3
    hold_thresh: 1
    only_tradable: true

executor:
  class: SimulatorExecutor
  module_path: qlib.backtest.executor
  kwargs:
    time_per_step: "day"
    generate_portfolio_metrics: true
    verbose: false

    # ▶ 미국 주식 거래비용 (KIS 기준)
    exchange_kwargs:
      freq: day
      limit_threshold: null           # 미국은 서킷브레이커 없음
      deal_price: "close"
      open_cost: 0.00                 # KIS 미국주식 매수 수수료: 0% (이벤트)
      close_cost: 0.0025              # 매도 수수료: 0.25% + SEC fee
      min_cost: 0

backtest:
  start_time: "2023-07-01"
  end_time: "2024-12-31"
  account: 10000                      # 초기 자금: $10,000
  benchmark: "^NDX"                   # NASDAQ 100 벤치마크
  exchange_kwargs:
    freq: day
    deal_price: "close"
    open_cost: 0.0
    close_cost: 0.0025
    min_cost: 0

record:
  - class: SignalRecord
    module_path: qlib.workflow.record_temp
    kwargs:
      model: <MODEL>
      dataset: <DATASET>
  - class: SigAnaRecord
    module_path: qlib.workflow.record_temp
    kwargs:
      ana_long_short: false
      ann_scaler: 252
  - class: PortAnaRecord
    module_path: qlib.workflow.record_temp
    kwargs:
      config:
        strategy: <STRATEGY>
        backtest: <BACKTEST>
